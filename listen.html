<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1a1a1a">
<title>Daily English</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", sans-serif;
    margin: 0;
    padding: 24px;
    background: linear-gradient(180deg, #1a1a1a 0%, #2d2d2d 100%);
    color: #f5f5f5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .card {
    width: 100%;
    max-width: 480px;
    background: rgba(255,255,255,0.06);
    border-radius: 20px;
    padding: 32px 24px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  .badge {
    display: inline-block;
    background: #4a90e2;
    color: white;
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 12px;
    margin-bottom: 12px;
  }
  h1 {
    margin: 0 0 4px 0;
    font-size: 24px;
    letter-spacing: -0.3px;
  }
  .date {
    color: #aaa;
    font-size: 14px;
    margin: 0 0 24px 0;
  }
  audio {
    width: 100%;
    margin-bottom: 16px;
  }
  .meta {
    color: #888;
    font-size: 13px;
    line-height: 1.6;
  }
  .err {
    color: #ff6b6b;
    font-size: 14px;
  }
</style>
</head>
<body>
  <div class="card">
    <span class="badge">📻 Daily English</span>
    <h1 id="title">오늘의 에피소드</h1>
    <p class="date" id="date">—</p>
    <audio controls preload="metadata" id="player">
      브라우저가 오디오 재생을 지원하지 않습니다.
    </audio>
    <p class="meta">
      약 10분 / 운전 중 청취 권장<br>
      이어폰 또는 차량 스피커 추천
    </p>
    <p class="err" id="err"></p>
  </div>
<script>
(function () {
  var params = new URLSearchParams(window.location.search);
  var dateStr = params.get('d');
  if (!dateStr) {
    var d = new Date();
    var off = d.getTimezoneOffset();
    var local = new Date(d.getTime() - off * 60000);
    dateStr = local.toISOString().slice(0, 10);
  }
  document.getElementById('date').textContent = dateStr;

  var player = document.getElementById('player');
  var src = document.createElement('source');
  src.src = 'audio/' + dateStr + '.mp3';
  src.type = 'audio/mpeg';
  player.appendChild(src);
  player.load();

  player.addEventListener('error', function () {
    document.getElementById('err').textContent =
      '오디오를 불러올 수 없습니다. 날짜를 확인하거나 잠시 후 다시 시도해주세요.';
  });
})();
</script>
</body>
</html>
